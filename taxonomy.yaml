# Shadow Tutor —— 初级工程师概念分类种子
#
# 用途：knowledge.json 里的概念 id 尽量挂到这份分类，便于跨会话聚合与抑制。
# 这不是封闭枚举——遇到表里没有的概念，agent 可新建 id（用 `分类.小写点分` 风格，
# 如 `react.use-effect-cleanup`），保持命名一致即可。
# 目标量级 ~150，覆盖初级工程师日常会撞到的"非显然"知识点。每条尽量是"会出错或常被误解"的点。

language-core:
  - js.closure                      # 闭包与变量捕获
  - js.hoisting
  - js.this-binding
  - js.equality-coercion            # == vs === 与隐式转换
  - js.array-methods                # map/filter/reduce/find 的选择
  - js.spread-rest
  - js.destructuring
  - js.optional-chaining
  - js.nullish-vs-or                # ?? 与 || 的区别
  - js.mutation-vs-immutability
  - js.reference-vs-value
  - js.template-literals
  - js.short-circuit
  - js.truthiness

async:
  - async.promise-basics
  - async.async-await
  - async.error-handling-try-catch
  - async.promise-all-vs-sequential
  - async.race-conditions
  - async.event-loop
  - async.callback-to-promise
  - async.cancellation-abortcontroller
  - async.debounce-throttle
  - async.unhandled-rejection

typescript:
  - ts.basic-types
  - ts.interface-vs-type
  - ts.generics
  - ts.union-narrowing
  - ts.optional-vs-undefined
  - ts.unknown-vs-any
  - ts.type-assertion-risk
  - ts.utility-types               # Partial/Pick/Omit/Record
  - ts.discriminated-union
  - ts.readonly
  - ts.function-overload
  - ts.inference-vs-annotation

react:
  - react.controlled-input
  - react.use-state-basics
  - react.use-state-stale-closure
  - react.use-effect-deps          # 依赖数组
  - react.use-effect-cleanup
  - react.use-memo                 # 动机：避免无关重算
  - react.use-callback
  - react.key-prop
  - react.lifting-state-up
  - react.derived-state            # 派生 state 不该塞进 useState
  - react.conditional-rendering
  - react.list-rendering
  - react.prop-drilling
  - react.context-basics
  - react.re-render-causes
  - react.effect-vs-event

state-data:
  - data.normalization
  - data.immutable-update          # 不可变更新数组/对象
  - data.pagination
  - data.optimistic-update
  - data.caching-basics
  - data.loading-error-states

http-api:
  - http.methods-semantics         # GET/POST/PUT/PATCH/DELETE 语义
  - http.status-codes
  - http.rest-resource-modeling
  - http.query-vs-body
  - http.cors
  - http.auth-headers
  - http.idempotency
  - http.fetch-error-handling
  - http.content-type
  - http.pagination-params

database:
