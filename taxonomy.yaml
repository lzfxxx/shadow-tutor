# Shadow Tutor — seed taxonomy of junior-engineer concepts
#
# Purpose: concept ids in knowledge.json should hang off this taxonomy where possible,
# to aggregate and suppress across sessions.
# This is not a closed enumeration — for a concept not listed, the agent may create a new
# id (use `category.kebab-dotted` style, e.g. `react.use-effect-cleanup`), keeping naming consistent.
# Target size ~150, covering the "non-obvious" points a junior engineer hits day to day.
# Each entry should be something that's "easy to get wrong or commonly misunderstood."

language-core:
  - js.closure                      # closures & variable capture
  - js.hoisting
  - js.this-binding
  - js.equality-coercion            # == vs === and implicit coercion
  - js.array-methods                # choosing map/filter/reduce/find
  - js.spread-rest
  - js.destructuring
  - js.optional-chaining
  - js.nullish-vs-or                # ?? vs || difference
  - js.mutation-vs-immutability
  - js.reference-vs-value
  - js.template-literals
  - js.short-circuit
  - js.truthiness

async:
  - async.promise-basics
  - async.async-await
  - async.error-handling-try-catch
  - async.promise-all-vs-sequential
  - async.race-conditions
  - async.event-loop
  - async.callback-to-promise
  - async.cancellation-abortcontroller
  - async.debounce-throttle
  - async.unhandled-rejection

typescript:
  - ts.basic-types
  - ts.interface-vs-type
  - ts.generics
  - ts.union-narrowing
  - ts.optional-vs-undefined
  - ts.unknown-vs-any
  - ts.type-assertion-risk
  - ts.utility-types               # Partial/Pick/Omit/Record
  - ts.discriminated-union
  - ts.readonly
  - ts.function-overload
  - ts.inference-vs-annotation

react:
  - react.controlled-input
  - react.use-state-basics
  - react.use-state-stale-closure
  - react.use-effect-deps          # dependency array
  - react.use-effect-cleanup
  - react.use-memo                 # motivation: avoid recompute on unrelated re-renders
  - react.use-callback
  - react.key-prop
  - react.lifting-state-up
  - react.derived-state            # derived state should not live in useState
  - react.conditional-rendering
  - react.list-rendering
  - react.prop-drilling
  - react.context-basics
  - react.re-render-causes
  - react.effect-vs-event

